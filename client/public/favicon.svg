<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f0728" />
    </linearGradient>
    <linearGradient id="v-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bg-grad)" stroke="#312e81" stroke-width="2" />
  <text x="50" y="70" font-family="'Outfit', 'Inter', sans-serif" font-size="58" font-weight="900" fill="url(#v-grad)" text-anchor="middle" filter="url(#glow)">V</text>
</svg>